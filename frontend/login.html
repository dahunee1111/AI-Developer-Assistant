<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | AI Developer Assistant</title>

  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(17, 24, 39, 0.88);
      --line: rgba(255, 255, 255, 0.08);
      --text: #eef4ff;
      --muted: #a7b4c8;
      --primary: #3b82f6;
      --primary-2: #22d3ee;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      --radius: 28px;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --input-bg: rgba(255,255,255,0.035);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 24%),
        radial-gradient(circle at top right, rgba(34,211,238,0.12), transparent 22%),
        linear-gradient(180deg, #08101d 0%, #0b1220 45%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-box {
      width: 100%;
      max-width: 460px;
      padding: 34px 32px 30px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(10,18,35,0.96), rgba(9,16,30,0.92));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .auth-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 18%, rgba(96,165,250,0.10), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(34,211,238,0.08), transparent 18%);
      pointer-events: none;
    }

    .auth-inner {
      position: relative;
      z-index: 1;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dbeafe;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h2 {
      font-size: 2.15rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 26px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 1rem;
      margin-bottom: 8px;
      font-weight: 800;
      color: #f8fbff;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--input-bg);
      color: var(--text);
      font-size: 15px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input::placeholder {
      color: #7f8da5;
    }

    input:focus {
      outline: none;
      border-color: rgba(96,165,250,0.65);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.14);
      background: rgba(255,255,255,0.05);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 15px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 12px 28px rgba(59,130,246,0.24);
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.97;
    }

    button:active {
      transform: translateY(0);
    }

    .result-box {
      margin-top: 16px;
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      border: 1px solid transparent;
    }

    .result-box.show {
      display: block;
    }

    .success {
      background: rgba(34,197,94,0.10);
      border-color: rgba(34,197,94,0.2);
      color: #dcfce7;
    }

    .error {
      background: rgba(239,68,68,0.10);
      border-color: rgba(239,68,68,0.2);
      color: #fee2e2;
    }

    .warning {
      background: rgba(245,158,11,0.10);
      border-color: rgba(245,158,11,0.2);
      color: #fef3c7;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      justify-content: center;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    .bottom {
      text-align: center;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .bottom a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 800;
      margin-left: 4px;
    }

    .bottom a:hover {
      text-decoration: underline;
    }

    .helper {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #8ea0ba;
      text-align: center;
    }

    @media (max-width: 560px) {
      .auth-box {
        padding: 28px 22px 24px;
        border-radius: 24px;
      }

      h2 {
        font-size: 1.9rem;
      }

      .sub {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-box">
    <div class="auth-inner">
      <div class="brand-badge">🔐 AI Developer Assistant</div>

      <h2>로그인</h2>
      <div class="sub">계정으로 로그인하고 나만의 학습 공간을 이어서 사용하세요.</div>

      <div class="form-group">
        <label for="email">이메일</label>
        <input id="email" type="email" placeholder="name@example.com" />
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호를 입력하세요" />
      </div>

      <button onclick="login()">로그인</button>

      <div id="resultBox" class="result-box"></div>

      <div class="divider">아직 없으세요?</div>

      <div class="bottom">
        계정이 없다면
        <a href="signup.html">회원가입</a>
      </div>

      <div class="helper">
        로그인 후 기록일기, 시험 결과, 포인트, 상점 기능을 이어서 사용할 수 있어요.
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script>
    const API_BASE = AppCommon.getApiBase();

    function setMessage(msg, type = "") {
      const box = document.getElementById("resultBox");
      box.className = "result-box show";
      if (type) box.classList.add(type);
      box.innerText = msg;
    }

    function clearMessage() {
      const box = document.getElementById("resultBox");
      box.className = "result-box";
      box.innerText = "";
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setMessage("이메일과 비밀번호를 입력하세요.", "error");
        return;
      }

      setMessage("로그인 중...", "warning");

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!data.user) {
          setMessage(data.message || "로그인 실패", "error");
          return;
        }

        AppCommon.saveLoggedInUser(data.user);
        setMessage("로그인 성공! 이동 중...", "success");

        setTimeout(() => {
          location.href = "index.html";
        }, 700);
      } catch (e) {
        setMessage("로그인 중 오류가 발생했습니다.", "error");
      }
    }

    document.getElementById("email").addEventListener("input", clearMessage);
    document.getElementById("password").addEventListener("input", clearMessage);

    document.getElementById("password").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login();
      }
    });

    AppCommon.redirectIfLoggedIn();
  </script>
</body>
</html>
